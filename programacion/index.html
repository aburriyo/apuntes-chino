<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programación — Apuntes Basti</title>
<style>
  :root { --color: #27ae60; --dark: #1a1a2e; --muted: #888; --border: #e5e5e5; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; background: #f5f5f7; color: #222; }
  header { background: var(--dark); color: #fff; padding: 40px 24px 32px; }
  .header-inner { max-width: 860px; margin: 0 auto; }
  .breadcrumb { font-size: 0.82rem; color: #777; margin-bottom: 12px; }
  .breadcrumb a { color: var(--color); text-decoration: none; }
  header h1 { font-size: 1.9rem; font-weight: 700; }
  header p { color: #aaa; margin-top: 6px; font-size: 0.9rem; }
  main { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
  .section-title { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 14px; margin-top: 36px; }
  .section-title:first-child { margin-top: 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; text-decoration: none; color: inherit; display: block; transition: box-shadow .15s, transform .15s; }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); transform: translateY(-2px); }
  .card-tag { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--color); margin-bottom: 8px; }
  .card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
  .card p { font-size: 0.83rem; color: var(--muted); line-height: 1.45; }
  .card-meta { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { display: inline-block; background: #f0f0f0; color: #555; border-radius: 20px; padding: 2px 10px; font-size: 0.73rem; }
  footer { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 24px; }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="breadcrumb"><a href="/">← Apuntes</a> / Programación</div>
    <h1>💻 Programación</h1>
    <p>Material de clases · Referencias · Snippets útiles</p>
  </div>
</header>
<main>
  <div class="section-title">Clases — 4°M 2026</div>
  <div class="grid">
    <a class="card" href="/4b/repaso-html-css/">
      <div class="card-tag">4°B · 9 mar 2026</div>
      <h3>HTML + CSS — Vuelta de vacaciones</h3>
      <p>Estructura HTML, etiquetas, selectores CSS, box model, Flexbox, ejemplo práctico de CV.</p>
      <div class="card-meta">
        <span class="badge">html</span>
        <span class="badge">css</span>
        <span class="badge">flexbox</span>
      </div>
    </a>
  </div>
</main>
<footer>Programación · <a href="https://basti.cl" style="color:inherit">basti.cl</a></footer>
</body>
</html>
