function normalize(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[üǖǘǚǜ]/g, 'u')
    .replace(/v/g, 'u');
}

let audioMap = {};
// Cargar mapping de audios MP3 (ElevenLabs voz Lily)
fetch('/audio/mapping.json')
  .then(r => r.json())
  .then(data => { audioMap = data; })
  .catch(() => {});

function speak(text) {
  const file = audioMap[text];
  if (file) {
    new Audio('/audio/' + file).play();
    return;
  }
  // Fallback: Web Speech API
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 0.8;
  speechSynthesis.speak(u);
}

function search(query) {
  if (!query.trim()) return [];
  const q = normalize(query.trim());
  return vocab.filter(v =>
    v.hz.includes(query) ||
    normalize(v.py).includes(q) ||
    normalize(v.es).includes(q)
  );
}

function srcToUrl(src, anchor) {
  const match = src.match(/Clase (\d+)/i);
  if (!match) return null;
  const num = match[1].padStart(2, '0');
  const url = `/basico2/clase${num}.html`;
  return anchor ? `${url}#${anchor}` : url;
}

function render(results, query) {
  const container = document.getElementById('results');
  if (!query.trim()) {
    container.innerHTML = '<div class="empty">Escribe algo para buscar</div>';
    return;
  }
  if (results.length === 0) {
    container.innerHTML = '<div class="empty">No se encontró "' + query + '"</div>';
    return;
  }
  let html = `<div class="result-count">${results.length} resultado${results.length > 1 ? 's' : ''}</div>`;
  results.forEach(v => {
    const link = `https://www.dong-chinese.com/wiki/${encodeURIComponent(v.hz.charAt(0))}`;
    const classUrl = srcToUrl(v.src, v.anchor);
    const sectionLabel = v.section ? ` · ${v.section}` : '';
    const sourceHtml = classUrl
      ? `<a href="${classUrl}" onclick="event.stopPropagation()">📖 ${v.src}${sectionLabel} →</a>`
      : v.src;
    html += `<div class="result-card" onclick="speak('${v.hz}')">
      <div class="r-hz"><a href="${link}" target="_blank" onclick="event.stopPropagation()">${v.hz}</a></div>
      <div class="r-info">
        <div class="r-py">${v.py}</div>
        <div class="r-es">${v.es}</div>
        <div class="r-source">${sourceHtml}</div>
      </div>
      <button class="r-audio" onclick="event.stopPropagation(); speak('${v.hz}')">🔊</button>
    </div>`;
  });
  container.innerHTML = html;
}

document.getElementById('searchInput').addEventListener('input', e => {
  const results = search(e.target.value);
  render(results, e.target.value);
});
