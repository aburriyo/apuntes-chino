  * { box-sizing: border-box; margin: 0; padding: 0; }

  .search-area { max-width: 600px; margin: 24px auto; padding: 0 24px; }

  .search-box:focus { border-color: #c0392b; }
  .search-hint { text-align: center; color: #aaa; font-size: 0.82em; margin-top: 8px; }
  .results { max-width: 600px; margin: 16px auto; padding: 0 24px; }

  .r-hz { font-size: 2rem; font-weight: 700; color: #c0392b; min-width: 50px; text-align: center; }
  .r-hz a { color: #c0392b; text-decoration: none; border-bottom: 1px dotted #c0392b; }
  .r-hz a:hover { color: #e74c3c; }
  .r-info { flex: 1; }
  .r-py { font-size: 1em; font-weight: 600; color: #333; }
  .r-es { font-size: 0.85em; color: #888; }
  .r-source { font-size: 0.72em; color: #bbb; margin-top: 4px; }
  .r-audio { background: none; border: none; font-size: 1.2em; cursor: pointer; opacity: 0.5; transition: opacity .2s; }
  .r-audio:hover { opacity: 1; }
  .empty { text-align: center; color: #ccc; font-size: 1.1em; margin-top: 60px; }

function normalize(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[üǖǘǚǜ]/g, 'u');
}

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 0.8;
  speechSynthesis.speak(u);
}

function search(query) {
  if (!query.trim()) return [];
  const q = normalize(query.trim());
  return vocab.filter(v =>
    v.hz.includes(query) ||
    normalize(v.py).includes(q) ||
    normalize(v.es).includes(q)
  );
}

function render(results, query) {
  const container = document.getElementById('results');
  if (!query.trim()) {
    container.innerHTML = '<div class="empty">Escribe algo para buscar</div>';
    return;
  }
  if (results.length === 0) {
    container.innerHTML = '<div class="empty">No se encontró "' + query + '"</div>';
    return;
  }
  let html = `<div class="result-count">${results.length} resultado${results.length > 1 ? 's' : ''}</div>`;
  results.forEach(v => {
    const link = `https://www.dong-chinese.com/wiki/${encodeURIComponent(v.hz.charAt(0))}`;
    html += `<div class="result-card" onclick="speak('${v.hz}')">
      <div class="r-hz"><a href="${link}" target="_blank" onclick="event.stopPropagation()">${v.hz}</a></div>
      <div class="r-info">
        <div class="r-py">${v.py}</div>
        <div class="r-es">${v.es}</div>
        <div class="r-source">${v.src}</div>
      </div>
      <button class="r-audio" onclick="event.stopPropagation(); speak('${v.hz}')">🔊</button>
    </div>`;
  });
  container.innerHTML = html;
}

document.getElementById('searchInput').addEventListener('input', e => {
  const results = search(e.target.value);
  render(results, e.target.value);
});
